[env]
JUST_UNSTABLE = "1"

[settings]
experimental = true
pipx.uvx = true

[tools]
rust = "1.94.1"                      # Required for schematools
go = "1.26.2"                       # Required for helm-schema-tools
node = "24"                         # Required for Astro (>=22.12.0)
bun = "latest"                      # Required for docs site
k3d = "5.8.3"
"aqua:astral-sh/uv" = "0.11.2"
"aqua:casey/just" = "1.48.1"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:helm" = "4.1.3"
"aqua:helm/chart-testing" = "3.14.0"
"aqua:mikefarah/yq" = "4.52.5"
"cargo:schematools-cli" = "0.22.0"
"pipx:yamllint" = "1.38.0"
"pipx:yamale" = "6.1.0"
